<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Interactive Overlay - V2</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Animate.css CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: transparent; /* Transparan untuk OBS */
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .overlay-container {
            pointer-events: none;
        }
        .khodam-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .quote-card {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .result-image {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- 1. PANEL KONTROL -->
    <div id="control-panel" class="fixed top-4 left-4 z-50 w-80 glass-panel p-6 rounded-3xl text-white transition-all duration-500 shadow-2xl">
        <h1 class="text-xl font-black mb-4 flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
            OVERLAY PRO V.2
        </h1>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Target Username</label>
                <input type="text" id="username-input" placeholder="@streamer_anda" 
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 mt-1 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="flex gap-2">
                <button id="btn-connect" class="flex-1 bg-indigo-600 hover:bg-indigo-700 font-bold py-2 rounded-xl transition-all active:scale-95 shadow-lg">HUBUNGKAN</button>
                <button id="btn-disconnect" class="hidden flex-1 bg-red-600 hover:bg-red-700 font-bold py-2 rounded-xl transition-all active:scale-95">PUTUS</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-slate-400 uppercase font-bold">TTS Volume</label>
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.8" class="w-full accent-indigo-500">
                </div>
                <div>
                    <label class="text-[9px] text-slate-400 uppercase font-bold">TTS Speed</label>
                    <input type="range" id="pitch-control" min="0.5" max="1.5" step="0.1" value="1" class="w-full accent-indigo-500">
                </div>
            </div>

            <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                <label class="text-[10px] text-slate-400 uppercase font-bold">Status Koneksi</label>
                <div id="status-badge" class="text-sm font-semibold text-slate-400">Idle</div>
            </div>

            <div>
                <label class="text-[10px] text-slate-400 uppercase font-bold">Chat Live Monitor</label>
                <div id="chat-log" class="mt-1 h-36 bg-black/50 rounded-xl p-3 text-[11px] overflow-y-auto font-mono text-indigo-300 border border-white/5">
                    [System]: Menunggu koneksi...
                </div>
            </div>
            
            <p class="text-[9px] text-center text-slate-500 uppercase tracking-tighter">Tekan <span class="text-white font-bold">'H'</span> untuk Sembunyikan Panel</p>
        </div>
    </div>

    <!-- 2. AREA OVERLAY UTAMA -->
    <div id="overlay-area" class="overlay-container absolute inset-0 flex flex-col items-center justify-center">
        <!-- Card dinamis akan muncul di sini -->
    </div>

    <script>
        /**
         * DATABASE & ASSET CONFIG
         */
        const KHODAM_LIST = [
            "Kue Putu Nyasar", "Harimau Depresi", "Remote TV Rusak", "Tutup Botol Sosro", "Kucing Oyen Preman",
            "Sempak Firaun", "Jin Tomang Galau", "Tahu Bulat Anget", "Korek Api Macet", "Kipas Angin Berdecit",
            "Nasi Bungkus Karet Dua", "Kuntilanak Pake Skincare", "Tuyul Berambut", "Genderuwo Pemalu", "Bakso Beranak",
            "Kabel Data Putus-nyambung", "Charger Ori Tapi KW", "Sapu Lidi Patah", "Gayung Love", "Ember Bocor",
            "Sandal Jepit Sebelah", "Topi SD", "Kaos Kaki Bolong", "Helm Bogo Retak", "Kecoa Terbang Brutal"
        ];

        const QUOTE_LIST = [
            "Jangan menyerah, besok masih bisa gagal lagi.",
            "Uang bukan segalanya, tapi segalanya butuh kuota.",
            "Masa depanmu tergantung pada mimpimu, jadi pergilah tidur.",
            "Kerja keraslah sampai tetangga mengira kamu pelihara tuyul.",
            "Kalau orang lain bisa, kenapa harus saya?",
            "Jadilah dirimu sendiri, kecuali jika kamu bisa jadi Batman.",
            "Tidur adalah satu-satunya cara untuk kaya raya tanpa modal.",
            "Kamu itu unik, sama seperti 7 miliar orang lainnya.",
            "Cantik itu relatif, tergantung letak kamera dan filter.",
            "Rezeki sudah ada yang mengatur, tapi kalau nggak dijemput ya diambil orang."
        ];

        /**
         * STATE MANAGEMENT
         */
        let isConnected = false;
        let eventQueue = [];
        let isProcessing = false;
        let lastUserAction = {}; 

        /**
         * CORE FUNCTIONS
         */
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            utterance.volume = document.getElementById('volume-control').value;
            utterance.pitch = document.getElementById('pitch-control').value;
            window.speechSynthesis.speak(utterance);
        }

        function getKhodam(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            return KHODAM_LIST[Math.abs(hash) % KHODAM_LIST.length];
        }

        async function processQueue() {
            if (isProcessing || eventQueue.length === 0) return;
            
            isProcessing = true;
            const event = eventQueue.shift();
            const area = document.getElementById('overlay-area');
            const card = document.createElement('div');
            
            // Generate Image URL (Menggunakan LoremFlickr dengan keyword yang sesuai)
            const imgKeyword = event.type === 'KHODAM' ? 'ghost,creature' : 'funny,inspiration';
            const imgUrl = `https://loremflickr.com/320/320/${imgKeyword}?random=${Math.random()}`;

            if (event.type === 'KHODAM') {
                card.className = `khodam-card animate__animated animate__zoomInDown p-10 rounded-[40px] text-white text-center max-w-lg border-8 border-white/10 flex flex-col items-center`;
                card.innerHTML = `
                    <p class="text-lg font-bold bg-white/20 px-4 py-1 rounded-full mb-6 italic">@${event.user}</p>
                    <img src="${imgUrl}" alt="" class="result-image mb-6 shadow-2xl">
                    <p class="text-sm uppercase tracking-[0.2em] opacity-80 mb-2">Isi Khodam Kamu:</p>
                    <h2 class="text-4xl font-black uppercase tracking-tight leading-none">${event.result}</h2>
                    <div class="mt-8 h-1.5 bg-black/20 w-full rounded-full overflow-hidden">
                        <div id="pb" class="h-full bg-white w-full transition-all duration-[7000ms] ease-linear"></div>
                    </div>
                `;
                speak(`Khodam milik ${event.user} adalah ${event.result}`);
            } else {
                card.className = `quote-card animate__animated animate__fadeInUp p-10 rounded-[40px] text-white text-center max-w-xl border-8 border-white/10 flex flex-col items-center`;
                card.innerHTML = `
                    <p class="text-lg font-bold bg-white/20 px-4 py-1 rounded-full mb-6 italic">@${event.user}</p>
                    <img src="${imgUrl}" alt="[Image of Quote]" class="result-image mb-6 shadow-2xl">
                    <p class="text-2xl font-bold italic leading-relaxed mb-4">"${event.result}"</p>
                    <span class="text-[10px] uppercase tracking-[0.3em] font-black opacity-60">Harian Motivasi Ngaco</span>
                `;
                speak(`Pesan untuk ${event.user}. ${event.result}`);
            }

            area.appendChild(card);

            setTimeout(() => {
                const bar = card.querySelector('#pb');
                if(bar) bar.style.width = '0%';
            }, 100);

            // Tampilkan selama 8 detik
            setTimeout(() => {
                card.classList.add('animate__fadeOutOut');
                setTimeout(() => {
                    card.remove();
                    isProcessing = false;
                    processQueue();
                }, 1000);
            }, 8000);
        }

        /**
         * EVENT HANDLERS
         */
        function addLog(user, msg) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div class="mb-1"><span class="text-slate-500">[${time}]</span> <span class="text-white font-bold">${user}:</span> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function handleIncomingChat(user, message) {
            const msg = message.toLowerCase();
            addLog(user, message);

            const now = Date.now();
            if (lastUserAction[user] && (now - lastUserAction[user] < 15000)) return;

            if (msg.includes("cekkodam") || msg.includes("khodam")) {
                lastUserAction[user] = now;
                eventQueue.push({ type: 'KHODAM', user: user, result: getKhodam(user) });
            } else if (msg.includes("quote") || msg.includes("kata")) {
                lastUserAction[user] = now;
                eventQueue.push({ type: 'QUOTE', user: user, result: QUOTE_LIST[Math.floor(Math.random() * QUOTE_LIST.length)] });
            }
            
            processQueue();
        }

        /**
         * CONNECTION LOGIC
         */
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const statusBadge = document.getElementById('status-badge');

        btnConnect.onclick = () => {
            const user = document.getElementById('username-input').value;
            if (!user) return alert("Masukkan username!");

            statusBadge.innerText = "Connecting...";
            statusBadge.className = "text-sm font-semibold text-yellow-400 animate-pulse";

            setTimeout(() => {
                isConnected = true;
                btnConnect.classList.add('hidden');
                btnDisconnect.classList.remove('hidden');
                statusBadge.innerText = "Connected to " + user;
                statusBadge.className = "text-sm font-semibold text-green-400";
                
                // Mulai simulasi jika tidak pakai backend asli
                startSimulation();
            }, 1000);
        };

        btnDisconnect.onclick = () => {
            isConnected = false;
            btnConnect.classList.remove('hidden');
            btnDisconnect.classList.add('hidden');
            statusBadge.innerText = "Disconnected";
            statusBadge.className = "text-sm font-semibold text-red-400";
        };

        function startSimulation() {
            const dummyUsers = ["Sultan_Gifting", "MemeLord", "Anti_Galau", "Ratu_Drama", "Bang_Zul"];
            const dummyMsgs = ["Cekkhodam min!", "Minta quote dong", "Khodam saya apa ya?", "Kata-kata hari ini", "Halo semua"];
            
            setInterval(() => {
                if (!isConnected) return;
                const u = dummyUsers[Math.floor(Math.random() * dummyUsers.length)];
                const m = dummyMsgs[Math.floor(Math.random() * dummyMsgs.length)];
                handleIncomingChat(u, m);
            }, 10000);
        }

        function toggleControlPanel() {
            document.getElementById('control-panel').classList.toggle('opacity-0');
            document.getElementById('control-panel').classList.toggle('pointer-events-none');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') toggleControlPanel();
        });
    </script>
</body>
</html>
